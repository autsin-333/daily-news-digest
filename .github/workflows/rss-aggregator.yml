name: Smart-Glasses RSS Aggregator

# 每天 UTC 00:30 = 北京时间 08:30 触发（给 Cowork 09:00 cron 留 30 min 缓冲）
on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write     # 需要 commit 到仓库

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install feedparser==6.0.12

      - name: Fetch RSS
        run: python src/fetch_rss.py

      - name: Commit outputs
        run: |
          git config user.name "rss-aggregator-bot"
          git config user.email "actions@github.com"
          git add rss-outputs/
          if git diff --staged --quiet; then
            echo "No new items today."
          else
            git commit -m "rss: daily aggregate $(date -u +'%Y-%m-%d')"
            git push
          fi
